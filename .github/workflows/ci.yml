name: CI

# Run on every push and pull request that targets a long-lived branch.
on:
  push:
    branches: [ main, dev, 'new/**' ]
  pull_request:
    branches: [ main, dev ]

# Cancel any in-flight run on the same branch when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Principle of least privilege — every job only needs to read the repo.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------
  # phpcs — WordPress + PHPCompatibility ruleset.
  # ---------------------------------------------------------------
  phpcs:
    name: PHPCS (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Lint on the lowest supported and a recent stable to catch
        # forward-incompatibility early.
        php: [ '7.4', '8.3' ]

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v3

      - name: Run PHPCS
        run: composer lint

  # ---------------------------------------------------------------
  # phpunit — runs the addon's PHP test suite.
  # ---------------------------------------------------------------
  #
  # Unit-level only at this stage: no MySQL service, no WordPress
  # test framework. The bootstrap just pulls in Composer's autoloader.
  # When real integration tests are added, plumb in a `services: { mysql: ... }`
  # block and a `wp-phpunit/wp-phpunit` install step here.
  phpunit:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ '7.4', '8.3' ]

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v3

      - name: Run PHPUnit
        run: composer test

  # ---------------------------------------------------------------
  # build — make sure the bundled assets compile cleanly.
  # ---------------------------------------------------------------
  build:
    name: Build assets
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build the bundle
        run: npm run build

      - name: Verify the build directory is non-empty
        run: |
          test -d build
          test "$(ls -A build)"
          echo "Built files:"
          ls -la build/
